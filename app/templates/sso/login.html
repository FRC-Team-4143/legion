<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign in — Legion SSO</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #111111; border: 1px solid #2a1a1a; border-radius: 10px; padding: 2rem; width: 380px; }
    .login-card h1 { color: #cc2200; font-size: 1.3rem; font-weight: 700; }
    label { color: #f0e8e8; }
    .form-control { background: #0d0d0d; border-color: #2a1a1a; color: #f0e8e8; }
    .form-control:focus { background: #0d0d0d; border-color: #cc2200; color: #f0e8e8; box-shadow: none; }
    .btn-primary { --bs-btn-bg: #cc2200; --bs-btn-border-color: #cc2200; }
    .btn-primary:hover { --bs-btn-bg: #aa1c00; --bs-btn-border-color: #aa1c00; }
    .text-muted { color: #9a7878 !important; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="mb-1"><i class="bi bi-shield-lock"></i> Sign in</h1>
    <p class="text-muted small mb-4">{% if app %}Signing in to {{ app }}{% else %}MARS/WARS single sign-on{% endif %}</p>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="post" action="/sso/authorize">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="last.first" autofocus required autocomplete="username">
      </div>
      <input type="hidden" name="app" value="{{ app }}">
      <input type="hidden" name="return_to" value="{{ return_to }}">
      <input type="hidden" name="state" value="{{ state }}">
      <button type="submit" class="btn btn-primary w-100">Continue</button>
    </form>
    <p class="text-muted small mt-3 mb-0">We'll send an Approve/Deny prompt to your Slack — no password needed.</p>
  </div>
</body>
</html>

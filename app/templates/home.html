<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MARS/WARS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0a0a0a; min-height: 100vh; color: #f0e8e8; }
    .page-wrap { max-width: 720px; margin: 0 auto; padding: 4rem 1.5rem; }
    h1 { color: #cc2200; font-weight: 700; }
    .text-muted { color: #9a7878 !important; }
    .tile {
      background: #111111; border: 1px solid #2a1a1a; border-radius: 10px;
      padding: 1.25rem; text-decoration: none; color: #f0e8e8;
      display: flex; align-items: center; gap: 1rem; transition: background .15s;
    }
    .tile:hover { background: #1a0f0f; color: #fff; }
    .tile .bi { font-size: 1.8rem; color: #e05540; }
    .tile .tile-app { font-weight: 600; }
    .tile .tile-tier { color: #9a7878; font-size: 0.85rem; }
    .empty-state { background: #111111; border: 1px solid #2a1a1a; border-radius: 10px; padding: 2rem; text-align: center; }
    .signout-link { color: #9a7878; }
    .signout-link:hover { color: #e05540; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <h1 class="mb-1">Hi, {{ name }}!</h1>
    <p class="text-muted mb-4">Your MARS/WARS apps</p>

    {% if tiles %}
    <div class="row g-3">
      {% for tile in tiles %}
      <div class="col-12 col-sm-6">
        <a class="tile" href="{{ tile.url }}">
          <i class="bi {{ tile.icon }}"></i>
          <div>
            <div class="tile-app">{{ tile.app }}</div>
            <div class="tile-tier">{{ tile.tier }}</div>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <div class="empty-state text-muted">
      No apps assigned yet — ask an admin to grant you access.
    </div>
    {% endif %}

    <p class="mt-4 mb-0">
      <a class="signout-link" href="/sso/logout?return_to=%2F"><i class="bi bi-box-arrow-right me-1"></i>Sign out</a>
    </p>
  </div>
</body>
</html>

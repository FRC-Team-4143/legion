<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Access denied — Legion</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0a0a0a; color: #f0e8e8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #111111; border: 1px solid #2a1a1a; border-radius: 10px; padding: 2rem; width: 420px; text-align: center; }
    h1 { color: #cc2200; font-size: 1.3rem; }
    a { color: #e05540; }
  </style>
</head>
<body>
  <div class="box">
    <h1><i class="bi bi-slash-circle"></i> Access denied</h1>
    <p>Signed in as <strong>{{ name }}</strong>, but this account isn't a Legion admin.</p>
    <p class="mb-0"><a href="/sso/logout?return_to=/admin/login">Sign in with a different account</a></p>
  </div>
</body>
</html>
